<html>
    <body>
        <div id="app"></div>

        <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

        <!-- Babel Script -->
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>


        <!-- Adicionando componentes com React -->
        <script type="text/jsx">

            const app = document.getElementById('app');

            function Header({title}) {
                return <h1>{title}</h1>
            }

            function handleClick() {
                console.log("adicione como um contador")
            }

            function HomePage () {
                const nomes = ['Rafael Brandão', 'Henrique Hirata', 'Luigi Bilyk']
                const [curtidas, setCurtidas] = React.useState(0);

                 function handleClick() {
                    setCurtidas(curtidas + 1);
                 }

                return (
                <div>
                    <Header title = "CasaPágina" />
                    <ul>
                        {nomes.map((nome) => ( 
                            <li key = {nome}>{nome}</li>
                        ))}
                    </ul>
                    <button onClick={handleClick}>Curtir({curtidas})</button>
                </div>
                );
            }

            const root = ReactDOM.createRoot(app);

            root.render(<HomePage />);

        </script>

    </body>
</html>
