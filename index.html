<html>
    <body>
        <div id="app"></div>

        <script type="text/javascript">

            //Seleciona um elemento, com um id específico 
            const app = document.getElementById('app');
            //Cria um elemento 
            const header = document.createElement('h1');
            //Cria um novo texto node para o elemento h1
            const text = 'Develop. Preview. Ship';
            const headContent = document.createTextNode(text);
            //Atribui o texto ao elemento 
            header.appendChild(headContent);
            //Insere o elemento novo a div
            app.append(header);

        </script>

    </body>
</html>
